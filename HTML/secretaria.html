<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Secretaria Virtual</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>
  <div class="container">
    <div class="brand">
      <img src="../assets/img/logo.png" alt="Inova Tech">
      <h1>Inova Tech - Centro de Capacitação Profissional</h1>
    </div>

    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="secretaria.html">Secretaria Virtual</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <div class="container">

    <section class="card">
      <div class="section-title">
        <h2>Formulário de Contato</h2>
      </div>

      <form>
        <fieldset>
          <legend>Contato</legend>

          <div class="form-grid">
            <div>
              <label>Nome</label>
              <input type="text" placeholder="Seu nome completo" required>
            </div>

            <div>
              <label>Email</label>
              <input type="email" placeholder="exemplo@dominio.com" required title="Digite um email válido">
            </div>

            <div>
              <label>Telefone</label>
              <input type="tel" placeholder="(85) 9xxxx-xxxx" pattern="\d{10,11}" maxlength="11" required title="Apenas números (10 ou 11 dígitos)">
            </div>

            <div>
              <label>Assunto</label>
              <input type="text" placeholder="Assunto da mensagem">
            </div>

            <div class="form-grid-full">
              <label>Curso</label>
              <input type="text" placeholder="Curso de interesse">
            </div>

            <div class="form-grid-full">
              <label>Mensagem</label>
              <textarea placeholder="Escreva sua mensagem aqui..."></textarea>
            </div>

          </div>

          <div class="actions">
            <button type="submit" class="btn-primary">Enviar</button>
            <button type="reset" class="btn-secondary">Limpar</button>
            <div class="help-row smallnote">Resposta em até 48h.</div>
          </div>

        </fieldset>
      </form>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>Matrícula</h2>
      </div>

      <form>
        <fieldset>
          <legend>Dados do aluno</legend>

          <div class="form-grid">
            <div>
              <label>Nome</label>
              <input type="text" placeholder="Nome completo" required>
            </div>

            <div>
              <label>CPF</label>
              <input type="text" placeholder="Somente números (11 dígitos)" pattern="\d{11}" maxlength="11" required title="CPF deve ter 11 números">
            </div>

            <div>
              <label>Endereço</label>
              <input type="text" placeholder="Rua, número, bairro">
            </div>

            <div>
              <label>Email</label>
              <input type="email" placeholder="exemplo@dominio.com" title="Digite um email válido">
            </div>

            <div>
              <label>Telefone</label>
              <input type="tel" placeholder="(85) 9xxxx-xxxx" pattern="\d{10,11}" maxlength="11" title="Apenas números (10 ou 11 dígitos)">
            </div>

            <div>
              <label>Sexo</label>
              <select>
                <option>Masculino</option>
                <option>Feminino</option>
                <option>Outro</option>
              </select>
            </div>

            <div>
              <label>Data de Nascimento</label>
              <input type="date">
            </div>

            <div>
              <label>Escolaridade</label>
              <select>
                <option>Ensino Médio</option>
                <option>Superior</option>
                <option>Pós-graduação</option>
              </select>
            </div>

            <div>
              <label>Cidade</label>
              <input type="text" placeholder="Cidade">
            </div>

            <div>
              <label>Estado</label>
              <input type="text" placeholder="Estado">
            </div>

            <div class="form-grid-full">
              <label>Enviar Documentos</label>
              <input type="file" accept="application/pdf,image/jpeg,image/png">
              <div class="smallnote">Aceitamos: PDF, JPG, PNG. Máx 5MB.</div>
            </div>

          </div>

          <div class="actions">
            <button type="submit" class="btn-primary">Enviar</button>
            <button type="reset" class="btn-secondary">Limpar</button>
          </div>

        </fieldset>
      </form>
    </section>

  </div>
</main>

<footer>
  <div class="container">
    <p>Contato: contato@inovatech.com</p>
  </div>
</footer>

</body>
</html>
